<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <title>Random Password Generator</title>
      <link rel="stylesheet" href="RPG.CSS">
      <link rel="scriptsheet" href="RPG.JS">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
   </head>
   <body>
      <div class="container">
         <div class="text">
            Random Password Generator
         </div>
         <div class="input-data">
            <div class="display">
               <input type="text">
               <span class="far fa-copy" onclick="copy()"></span>
               <span class="fas fa-copy" onclick="copy()"></span>
            </div>
            <button>Generate Password</button>
         </div>
         <style>
            @import url('https://fonts.googleapis.com/css?family=Trirong');
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Trirong", serif;
}
html,body{
  display: grid;
  height: 100%;
  place-items: center;
  background: #000000;
  text-align: center;
}
.container{
  width: 450px;
  background: #09006f;
  border: 1px solid #0c0c0c;
  border-radius: 5px;
  padding: 20px 25px;
}
.container .text{
  color: #ffffff;
  font-weight: 600;
  font-size: 26px;
  line-height: 35px;
}
.container .input-data{
  margin: 20px 5px 15px 5px;
}
.input-data .display{
  height: 45px;
  width: 100%;
  display: flex;
  position: relative;
}
.input-data .display input{
  height: 100%;
  width: 100%;
  outline: none;
  color: #ffffff;
  border: 0.01px solid #313131;
  background: #313131;
  padding: 10px;
  font-size: 17px;
  pointer-events: none;
  user-select: none;
}
.input-data .display span{
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 25px;
  color: rgb(26, 255, 0);
  z-index: 999;
  display: none;
  cursor: pointer;
}
.input-data button{
  display: block;
  height: 45px;
  width: 100%;
  margin-top: 15px;
  border: 0.1px solid #ffffff;
  outline: none;
  background: #ffffff;
  color: #464646;
  font-size: 17px;
  font-weight: 500;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.1s ease;
}
.input-data button:hover{
  background: #222;
}
         </style>
         <script>
            const display = document.querySelector("input"),
            button = document.querySelector("button"),
            copyBtn = document.querySelector("span.far"),
            copyActive = document.querySelector("span.fas");
            let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
            button.onclick = ()=>
           {
              let i,
              randomPassword = "";
              copyBtn.style.display = "block";
              copyActive.style.display = "none";
              for (i = 0; i < 16; i++) {
                randomPassword = randomPassword + chars.charAt(
                  Math.floor(Math.random() * chars.length)
                );
              }
              display.value = randomPassword;
            }
            function copy()
           {
              copyBtn.style.display = "none";
              copyActive.style.display = "block";
              display.select();
              document.execCommand("copy");
           }
   </script>
      </div>
   </body>
</html>
